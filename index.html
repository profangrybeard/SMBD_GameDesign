<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Follow the Fun — Game Design Notebook</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Outfit', sans-serif; background: #f8fafc; color: #1e293b; -webkit-text-size-adjust: 100%; }
input, textarea, button, select { font-family: 'Outfit', sans-serif; }
.container { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
.header { background: #1a1f36; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 20; }
.header-title { font-size: 14px; font-weight: 700; color: #f8fafc; }
.header-saved { font-size: 10px; color: #059669; margin-left: 8px; display: none; }
.header-saved.show { display: inline; }
.header-right { display: flex; align-items: center; gap: 6px; }
.btn-export { background: #f59e0b; border: none; border-radius: 6px; padding: 6px 10px; color: #fff; font-size: 11px; font-weight: 600; cursor: pointer; }
.btn-nav-toggle { background: rgba(255,255,255,0.1); border: none; border-radius: 6px; padding: 6px 10px; color: #fff; font-size: 11px; font-weight: 600; cursor: pointer; }
.progress { height: 3px; background: #e2e8f0; }
.progress-fill { height: 100%; background: #f59e0b; transition: width 0.3s ease; }
.content { flex: 1; padding: 16px 16px 100px; overflow-y: auto; }
.bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: #fff; border-top: 1px solid #e2e8f0; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; z-index: 20; }
.btn-prev, .btn-next { display: flex; align-items: center; gap: 4px; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
.btn-prev { border: 1.5px solid #1e293b; background: transparent; color: #1e293b; }
.btn-prev:disabled { border-color: #e2e8f0; color: #cbd5e1; cursor: default; }
.btn-next { border: none; background: #059669; color: #fff; }
.btn-next:disabled { background: #e2e8f0; cursor: default; }
.page-label { font-size: 11px; color: #64748b; text-align: center; font-weight: 600; }
.section-header { padding: 14px 16px; border-radius: 10px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
.section-header .title { color: #fff; font-weight: 700; font-size: 15px; }
.section-header .subtitle { color: rgba(255,255,255,0.7); font-size: 11px; margin-top: 2px; }
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 12px; font-weight: 600; color: #1e293b; margin-bottom: 4px; }
.field input, .field textarea { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1.5px solid #e2e8f0; font-size: 14px; background: #fff; color: #1e293b; outline: none; transition: border-color 0.2s; }
.field input:focus, .field textarea:focus { border-color: #f59e0b; }
.field textarea { resize: vertical; min-height: 60px; }
.field.small input, .field.small textarea { padding: 8px 10px; font-size: 13px; }
.card { background: #f1f5f9; border-radius: 10px; padding: 14px; margin-bottom: 10px; }
.card-accent { border-left: 3px solid #f59e0b; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.tag-row { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 12px; }
.tag { font-size: 10px; padding: 3px 8px; border-radius: 12px; background: #f1f5f9; color: #64748b; border: 1px solid #e2e8f0; }
.goal-btn { font-size: 11px; padding: 5px 12px; border-radius: 20px; border: 1.5px solid #e2e8f0; background: #fff; color: #64748b; cursor: pointer; transition: all 0.2s; }
.goal-btn.active { border-color: #f59e0b; background: rgba(245,158,11,0.08); color: #f59e0b; font-weight: 700; }
.dropdown { position: absolute; top: 46px; right: 12px; background: #fff; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); z-index: 30; padding: 6px; min-width: 200px; display: none; }
.dropdown.show { display: block; }
.dropdown button { display: flex; align-items: center; gap: 8px; width: 100%; padding: 8px 10px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; background: transparent; color: #1e293b; text-align: left; }
.dropdown button:hover { background: #f1f5f9; }
.dropdown button.active { background: rgba(245,158,11,0.08); color: #f59e0b; font-weight: 700; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; display: flex; align-items: flex-end; justify-content: center; }
.modal { background: #fff; border-radius: 16px 16px 0 0; width: 100%; max-width: 480px; max-height: 85vh; display: flex; flex-direction: column; }
.modal-header { padding: 16px 16px 12px; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; }
.modal-buttons { padding: 12px 16px; display: flex; gap: 8px; flex-wrap: wrap; }
.modal-btn { flex: 1; min-width: 90px; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 12px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; }
.modal-preview { flex: 1; overflow: auto; padding: 0 16px 16px; }
.modal-preview pre { font-size: 10px; color: #64748b; line-height: 1.5; white-space: pre-wrap; word-break: break-word; background: #f1f5f9; padding: 12px; border-radius: 8px; font-family: monospace; }
.cover-title { text-align: center; padding: 20px 0 10px; }
.cover-title h1 { font-size: 28px; font-weight: 900; color: #1e293b; }
.cover-title .bar { width: 40px; height: 3px; background: #f59e0b; margin: 8px auto; border-radius: 2px; }
.dream-layer { display: flex; align-items: center; gap: 8px; padding: 4px 0; border-bottom: 1px solid #e2e8f0; font-size: 12px; }
.dream-layer:last-child { border-bottom: none; }
.dream-layer .level { font-size: 9px; font-weight: 700; color: #64748b; width: 55px; font-family: monospace; }
.dream-layer .level.deep { color: #f59e0b; }
.dream-layer .name { font-weight: 600; color: #1e293b; }
.dream-layer .desc { margin-left: auto; font-size: 11px; color: #94a3b8; }
.signoff { background: #f1f5f9; border-radius: 10px; padding: 16px; text-align: center; margin-top: 16px; }
.colophon { font-size: 10px; color: #94a3b8; line-height: 1.6; background: #f1f5f9; border-radius: 8px; padding: 12px; margin-top: 20px; }
.checklist { background: #ecfdf5; border: 1px solid #a7f3d0; border-radius: 10px; padding: 10px 12px; margin-bottom: 14px; }
.checklist-header { display: flex; justify-content: space-between; align-items: center; font-size: 12px; font-weight: 700; color: #065f46; margin-bottom: 6px; }
.checklist-header .prog { font-family: monospace; font-size: 11px; background: #fff; padding: 2px 6px; border-radius: 10px; border: 1px solid #a7f3d0; }
.check-item { display: flex; align-items: center; gap: 7px; font-size: 11px; padding: 3px 0; color: #475569; line-height: 1.3; }
.check-item.done { color: #059669; }
.check-box { display: inline-flex; align-items: center; justify-content: center; width: 14px; height: 14px; border-radius: 4px; border: 1.5px solid #cbd5e1; font-size: 10px; line-height: 1; background: #fff; flex-shrink: 0; font-weight: 700; }
.check-item.done .check-box { background: #059669; border-color: #059669; color: #fff; }
.synopsis { background: #fff; border: 1.5px solid #e2e8f0; border-radius: 12px; padding: 14px; margin: 14px 0; }
.synopsis-title { font-size: 13px; font-weight: 700; color: #1e293b; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
.synopsis-sub { font-size: 11px; color: #64748b; margin-bottom: 10px; }
.syn-row { display: flex; align-items: center; gap: 8px; padding: 7px 4px; border-radius: 6px; cursor: pointer; font-size: 12px; border-bottom: 1px solid #f1f5f9; }
.syn-row:last-child { border-bottom: none; }
.syn-row:active { background: #f1f5f9; }
.syn-status { width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; border: 1.5px solid #cbd5e1; color: #cbd5e1; flex-shrink: 0; font-weight: 700; background: #fff; }
.syn-row.done .syn-status { background: #059669; border-color: #059669; color: #fff; }
.syn-label { flex: 1; color: #1e293b; font-weight: 500; }
.syn-row.done .syn-label { color: #059669; font-weight: 600; }
.syn-prog { font-size: 10px; color: #94a3b8; font-weight: 700; font-family: monospace; background: #f1f5f9; padding: 2px 6px; border-radius: 10px; }
.syn-row.done .syn-prog { color: #059669; background: #ecfdf5; }
.syn-overall { font-size: 11px; color: #64748b; margin-top: 10px; padding-top: 10px; border-top: 1px solid #e2e8f0; text-align: center; }
.syn-overall strong { color: #059669; font-size: 13px; }
.syn-bar { height: 6px; background: #f1f5f9; border-radius: 3px; margin-top: 8px; overflow: hidden; }
.syn-bar-fill { height: 100%; background: #059669; transition: width 0.3s ease; }
.cb-row { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; background: #fff; border: 1.5px solid #e2e8f0; border-radius: 8px; margin-bottom: 6px; cursor: pointer; user-select: none; transition: background 0.15s, border-color 0.15s; }
.cb-row.checked { background: #ecfdf5; border-color: #a7f3d0; }
.cb-box { width: 20px; height: 20px; border: 2px solid #cbd5e1; border-radius: 5px; flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; background: #fff; }
.cb-row.checked .cb-box { background: #059669; border-color: #059669; color: #fff; }
.cb-label { font-size: 12px; color: #1e293b; line-height: 1.4; }
.cb-row.checked .cb-label { color: #065f46; font-weight: 600; }
.cb-group-title { font-size: 12px; font-weight: 700; color: #1e293b; margin: 12px 0 6px; }
.cb-group-sub { font-size: 11px; color: #64748b; margin-bottom: 8px; font-style: italic; }
</style>
</head>
<body>
<div class="container" id="app"></div>
<script>
const STORAGE_KEY = "ftf-workbook-v1";
// Cloudflare Worker URL (see worker.js for deploy instructions). When set,
// Next clicks and Export actions silently sync each scout's submission to
// the Drive folder configured in the Worker. Leave empty to disable cloud
// save — the form still works fully via localStorage.
const SAVE_URL = "";
// Must match the SHARED_SECRET secret you set on the Worker. It's not
// real security (anyone viewing source can read it), just a basic gate
// to keep random bots from spamming the endpoint.
const SHARED_SECRET = "";
// Destination address for the Submit button. Tapping it opens the scout's
// mail app with the notebook pre-filled — zero backend setup.
const RECIPIENT_EMAIL = "rindsey@gmail.com";
let data = {};
let pageIdx = 0;
let showNavDD = false;
let showExportModal = false;
let savedTimeout = null;

// Load from localStorage
try { const s = localStorage.getItem(STORAGE_KEY); if (s) data = JSON.parse(s); } catch {}

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
  const el = document.getElementById("saved-indicator");
  if (el) { el.classList.add("show"); clearTimeout(savedTimeout); savedTimeout = setTimeout(() => el.classList.remove("show"), 1500); }
}

function set(key, val) { data[key] = val; save(); updateChecklists(); }

// ─── REQUIREMENTS CHECKLIST CONFIG ───
const requirements = [
  { id: "1a", title: "Req 1a — Game Elements", pageId: "a1", checks: [
    { label: "Game title chosen", fields: ["a1_title"] },
    { label: "Medium identified", fields: ["a1_medium"] },
    { label: "Objects listed", fields: ["a1_objects"] },
    { label: "Actions listed", fields: ["a1_actions"] },
    { label: "Play Space described", fields: ["a1_playSpace"] },
    { label: "Players described", fields: ["a1_players"] },
    { label: "Goals listed", fields: ["a1_goals"] },
    { label: "Rules listed", fields: ["a1_rules"] },
    { label: "Group discussion noted", fields: ["a1_discussion"] },
  ]},
  { id: "2", title: "Req 2 — Design Terms", pageId: "a2", checks: [
    { label: "Term 1 (term + game + how)", fields: ["a2_t1_term","a2_t1_game","a2_t1_how"] },
    { label: "Term 2 (term + game + how)", fields: ["a2_t2_term","a2_t2_game","a2_t2_how"] },
    { label: "Term 3 (term + game + how)", fields: ["a2_t3_term","a2_t3_game","a2_t3_how"] },
    { label: "Term 4 (term + game + how)", fields: ["a2_t4_term","a2_t4_game","a2_t4_how"] },
    { label: "Term 5 (term + game + how)", fields: ["a2_t5_term","a2_t5_game","a2_t5_how"] },
  ]},
  { id: "4", title: "Req 4 — Rule Hacking", pageId: "a3", checks: [
    { label: "Rule Change 1 (predict + result + feeling)", fields: ["a3_r1_predict","a3_r1_result","a3_r1_feeling"] },
    { label: "Rule Change 2 (predict + result + feeling)", fields: ["a3_r2_predict","a3_r2_result","a3_r2_feeling"] },
    { label: "Rule Change 3 (predict + result + feeling)", fields: ["a3_r3_predict","a3_r3_result","a3_r3_feeling"] },
  ]},
  { id: "5", title: "Req 5 — Design Your Game", pageId: "a4", checks: [
    { label: "Vision Statement", fields: ["a4_vision"] },
    { label: "Game basics (name, players, medium, time)", fields: ["a4_name","a4_players","a4_medium","a4_time"] },
    { label: "Theme defined", fields: ["a4_theme"] },
    { label: "Player experience goal selected", fields: ["a4_goals"] },
    { label: "Core loop — all 5 steps", fields: ["a4_loop0","a4_loop1","a4_loop2","a4_loop3","a4_loop4"] },
    { label: "Rules listed", fields: ["a4_rules"] },
    { label: "Resources listed", fields: ["a4_resources"] },
  ]},
  { id: "6", title: "Req 6 — Playtest Log", pageId: "pt", checks: [
    { label: "Playtest Round 1 complete", fields: ["pt1_players","pt1_worked","pt1_broken","pt1_changed","pt1_why","pt1_after"] },
    { label: "Playtest Round 2 complete", fields: ["pt2_players","pt2_worked","pt2_broken","pt2_changed","pt2_why","pt2_after"] },
    { label: "Playtest Round 3 complete", fields: ["pt3_players","pt3_worked","pt3_broken","pt3_changed","pt3_why","pt3_after"] },
  ]},
  { id: "7", title: "Req 7 — Blind Test", pageId: "bt", checks: [
    { label: "Setup instructions", fields: ["bt_setup"] },
    { label: "Play instructions", fields: ["bt_play"] },
    { label: "Win / End condition", fields: ["bt_win"] },
    { label: "Game objectives", fields: ["bt_objectives"] },
    { label: "Observed misunderstandings", fields: ["bt_misunderstand"] },
    { label: "Observed unexpected actions", fields: ["bt_unexpected"] },
    { label: "Observed where they got stuck", fields: ["bt_stuck"] },
    { label: "Most fun moment noted", fields: ["bt_fun"] },
    { label: "What I like most", fields: ["bt_like"] },
    { label: "One change I'd make", fields: ["bt_change"] },
  ]},
  { id: "8b", title: "Req 8b — Reflection", pageId: "ref", checks: [
    { label: "Learning #1", fields: ["reflect1"] },
    { label: "Learning #2", fields: ["reflect2"] },
    { label: "Learning #3", fields: ["reflect3"] },
  ]},
  { id: "1b", title: "Req 1b — Play Value Types (Plan B)", pageId: "pb", checks: [
    { label: "Play Value Type 1", fields: ["pb_pv1_type","pb_pv1_game"] },
    { label: "Play Value Type 2", fields: ["pb_pv2_type","pb_pv2_game"] },
    { label: "Play Value Type 3", fields: ["pb_pv3_type","pb_pv3_game"] },
    { label: "Play Value Type 4", fields: ["pb_pv4_type","pb_pv4_game"] },
  ]},
  { id: "3", title: "Req 3 — Intellectual Property (Plan B)", pageId: "pb", checks: [
    { label: "Definition of IP", fields: ["pb_ip_def"] },
    { label: "Three types of IP in games", fields: ["pb_ip_types"] },
    { label: "Why IP protection is necessary", fields: ["pb_ip_why"] },
    { label: "Licensed property example", fields: ["pb_ip_example"] },
    { label: "Heard: infringement vs. fair use", fields: ["pb_ip_chk_fair"] },
    { label: "Heard: consequences of infringement", fields: ["pb_ip_chk_conseq"] },
    { label: "Heard: can I copy other people's ideas?", fields: ["pb_ip_chk_copying"] },
  ]},
];

function isFilled(f) { const v = data[f]; if (typeof v === "boolean") return v; return ((v ?? "") + "").trim().length > 0; }
function checkbox(key, label) {
  const checked = !!data[key];
  return `<div class="cb-row${checked ? " checked" : ""}" onclick="toggleCheck('${key}')"><span class="cb-box">${checked ? "✓" : ""}</span><span class="cb-label">${label}</span></div>`;
}
function toggleCheck(key) { data[key] = !data[key]; save(); render(); }
function checkDone(c) { return c.fields.every(isFilled); }
function reqStats(r) { const d = r.checks.filter(checkDone).length; return { done: d, total: r.checks.length, complete: d === r.checks.length }; }
function pageIndexOf(id) { return pages.findIndex(p => p.id === id); }

function renderChecklistInner(reqId) {
  const r = requirements.find(x => x.id === reqId);
  if (!r) return "";
  const s = reqStats(r);
  return `<div class="checklist-header"><span>${r.title}</span><span class="prog">${s.done}/${s.total}${s.complete ? " ✓" : ""}</span></div>` +
    r.checks.map(c => {
      const done = checkDone(c);
      return `<div class="check-item${done ? " done" : ""}"><span class="check-box">${done ? "✓" : ""}</span><span>${c.label}</span></div>`;
    }).join("");
}

function renderChecklist(reqIds) {
  const ids = Array.isArray(reqIds) ? reqIds : [reqIds];
  return ids.map(id => `<div class="checklist" data-checklist="${id}">${renderChecklistInner(id)}</div>`).join("");
}

function renderSynopsisInner() {
  let totalDone = 0, totalChecks = 0;
  const rows = requirements.map(r => {
    const s = reqStats(r);
    totalDone += s.done; totalChecks += s.total;
    return `<div class="syn-row${s.complete ? " done" : ""}" onclick="goTo(${pageIndexOf(r.pageId)})">
      <span class="syn-status">${s.complete ? "✓" : ""}</span>
      <span class="syn-label">${r.title}</span>
      <span class="syn-prog">${s.done}/${s.total}</span>
    </div>`;
  }).join("");
  const pct = totalChecks ? Math.round((totalDone / totalChecks) * 100) : 0;
  return `<div class="synopsis-title">📋 Requirements Checklist</div>
    <div class="synopsis-sub">Tap a requirement to jump to that page. Items check off as you fill in your work.</div>
    ${rows}
    <div class="syn-bar"><div class="syn-bar-fill" style="width:${pct}%"></div></div>
    <div class="syn-overall">Overall progress: <strong>${totalDone}/${totalChecks}</strong> (${pct}%)</div>`;
}

function renderSynopsis() {
  return `<div class="synopsis" id="synopsis">${renderSynopsisInner()}</div>`;
}

function updateChecklists() {
  document.querySelectorAll("[data-checklist]").forEach(el => {
    el.innerHTML = renderChecklistInner(el.getAttribute("data-checklist"));
  });
  const syn = document.getElementById("synopsis");
  if (syn) syn.innerHTML = renderSynopsisInner();
}

function field(label, key, opts = {}) {
  const v = data[key] || "";
  const ph = opts.placeholder || "";
  const cls = opts.small ? "field small" : "field";
  if (opts.multiline) {
    return `<div class="${cls}"><label>${label}</label><textarea placeholder="${ph}" oninput="set('${key}',this.value)">${v}</textarea></div>`;
  }
  return `<div class="${cls}"><label>${label}</label><input type="text" value="${esc(v)}" placeholder="${ph}" oninput="set('${key}',this.value)"></div>`;
}

function esc(s) { return (s||"").replace(/"/g, "&quot;").replace(/</g, "&lt;"); }
function sectionHeader(title, subtitle, color) {
  return `<div class="section-header" style="background:${color}"><div><div class="title">${title}</div>${subtitle ? `<div class="subtitle">${subtitle}</div>` : ""}</div></div>`;
}

// ─── PAGES ───
const pages = [
  { id: "cover", title: "Cover", render: renderCover },
  { id: "a1", title: "Game Elements", render: renderA1 },
  { id: "a2", title: "Design Terms", render: renderA2 },
  { id: "a3", title: "Rule Hacking", render: renderA3 },
  { id: "a4", title: "Design Your Game", render: renderA4 },
  { id: "pt", title: "Playtest Log", render: renderPT },
  { id: "bt", title: "Blind Test", render: renderBT },
  { id: "ref", title: "Reflection", render: renderRef },
  { id: "pb", title: "Plan B", render: renderPB },
];

function renderCover() {
  const layers = [
    { level: "SURFACE", name: "Context of Play", desc: "Who plays, where, why" },
    { level: "LEVEL 1", name: "Storytelling", desc: "Narratives from play" },
    { level: "LEVEL 2", name: "Theme", desc: "The wrapper" },
    { level: "DEEPEST", name: "Rules / Abstraction", desc: "Core mechanics", deep: true },
  ];
  return `
    <div class="cover-title"><h1>FOLLOW THE FUN</h1><div class="bar"></div><div style="font-size:14px;color:#64748b">Game Design Notebook</div><div style="font-size:12px;color:#64748b">Game Design Merit Badge</div></div>
    ${renderSynopsis()}
    ${field("Scout Name", "scoutName", { placeholder: "Your name" })}
    ${field("Troop / Pack", "troop", { placeholder: "Troop number" })}
    ${field("Date", "date", { placeholder: "Today's date" })}
    <div class="card" style="margin-top:10px">
      <div style="font-size:13px;font-weight:700;margin-bottom:6px">Your Guide Today</div>
      <div style="font-size:12px;color:#64748b;line-height:1.5"><strong>Tim Lindsey</strong> — Professor, SCAD Atlanta<br>~30 Years in Game Development<br><span style="font-size:11px">Cool Boarders • Oblivion • Global Agenda • Lichdom • The Culling • Yuri's Resolve</span></div>
    </div>
    <div class="card">
      <div style="font-size:13px;font-weight:700;margin-bottom:6px">The Dream Layers</div>
      ${layers.map(l => `<div class="dream-layer"><span class="level${l.deep ? " deep" : ""}">${l.level}</span><span class="name">${l.name}</span><span class="desc">${l.desc}</span></div>`).join("")}
    </div>
    <div style="text-align:center;font-size:11px;font-style:italic;color:#1e293b;margin-top:12px">"Our Business is Fun"</div>`;

function renderA1() {

function toggleGoal(g) {

  else current.push(g);
  set("a4_goals", current.join(", "));
  render();
}

function formatExport() {
  const ln = (label, key) => data[key] ? `${label}: ${data[key]}` : "";
  const sep = "\n" + "=".repeat(40);
  const s = (title) => `${sep}\n${title}${sep}`;
  let lines = [
    "FOLLOW THE FUN — Game Design Notebook",
    `Scout: ${data.scoutName || "(not filled)"}`, `Troop: ${data.troop || ""}`, `Date: ${data.date || ""}`,
    s("ACTIVITY 1: GAME ELEMENTS (Req 1a)"),
    ln("Game", "a1_title"), ln("Medium", "a1_medium"), ln("Objects", "a1_objects"), ln("Actions", "a1_actions"), ln("Play Space", "a1_playSpace"), ln("Players", "a1_players"), ln("Goals", "a1_goals"), ln("Rules", "a1_rules"), ln("Discussion", "a1_discussion"),
    s("ACTIVITY 2: DESIGN TERMS (Req 2)"),
    ...[1,2,3,4,5].flatMap(i => [ln(`Term ${i}`, `a2_t${i}_term`), ln("  Game", `a2_t${i}_game`), ln("  How", `a2_t${i}_how`)]),
    s("ACTIVITY 3: RULE HACKING (Req 4)"),
    ...[1,2,3].flatMap(i => [`Rule Change ${i}:`, ln("  Prediction", `a3_r${i}_predict`), ln("  Result", `a3_r${i}_result`), ln("  Feeling", `a3_r${i}_feeling`)]),
    s("ACTIVITY 4: DESIGN YOUR GAME (Req 5)"),
    ln("Vision", "a4_vision"), ln("Name", "a4_name"), ln("Players", "a4_players"), ln("Medium", "a4_medium"), ln("Time", "a4_time"), ln("Theme", "a4_theme"), ln("Goals", "a4_goals"),
    "Core Loop:", ...[0,1,2,3,4].map(i => ln(`  Step ${i+1}`, `a4_loop${i}`)),
    ln("Rules", "a4_rules"), ln("Resources", "a4_resources"),
    s("PLAYTEST LOG (Req 6)"),
    ...[1,2,3].flatMap(r => [`Round ${r}:`, ln("  Worked", `pt${r}_worked`), ln("  Broken", `pt${r}_broken`), ln("  Changed", `pt${r}_changed`), ln("  Why", `pt${r}_why`), ln("  Result", `pt${r}_after`)]),
    s("BLIND TEST (Req 7)"),
    ln("Setup", "bt_setup"), ln("Play", "bt_play"), ln("Win", "bt_win"), ln("Misunderstood", "bt_misunderstand"), ln("Unexpected", "bt_unexpected"), ln("Stuck", "bt_stuck"), ln("Fun Moment", "bt_fun"), ln("Like Most", "bt_like"), ln("Change", "bt_change"),
    s("REFLECTION (Req 8b)"),
    ln("1", "reflect1"), ln("2", "reflect2"), ln("3", "reflect3"),
    "\n— Follow the Fun • timlindsey.com —",
  ];
  return lines.filter(Boolean).join("\n");
}

function doDownload() {
  cloudSave();
  const name = (data.scoutName || "scout").replace(/\s+/g, "_").toLowerCase();
  const blob = new Blob([formatExport()], { type: "text/plain" });
  const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
  a.download = `game_design_notebook_${name}.txt`; a.click(); URL.revokeObjectURL(a.href);
}

function doCopy() {
  cloudSave();
  const ta = document.createElement("textarea"); ta.value = formatExport();
  ta.style.cssText = "position:fixed;left:-9999px"; document.body.appendChild(ta);
  ta.select(); document.execCommand("copy"); document.body.removeChild(ta);
  const btn = document.getElementById("copy-btn");
  if (btn) { btn.textContent = "✓ Copied!"; setTimeout(() => { btn.textContent = "📋 Copy"; }, 2000); }
}

function doShare() {
  cloudSave();
  if (navigator.share) {
    navigator.share({ title: `Game Design Notebook — ${data.scoutName || "Scout"}`, text: formatExport() }).catch(() => {});
  } else { doCopy(); }
}

function doEmail() {
  cloudSave();
  const scout = data.scoutName || "Scout";
  const troopBit = data.troop ? ` — Troop ${data.troop}` : "";
  const subject = `Game Design Notebook — ${scout}${troopBit}`;
  const body = formatExport();
  let url = `mailto:${RECIPIENT_EMAIL}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  // Many mail clients truncate mailto URLs around 2KB. Modern mobile apps
  // tolerate ~6KB. If we'd blow past that, trim the body and also kick off
  // the .txt download so the scout can attach the complete file.
  if (url.length > 7000) {
    const note = "\n\n[The complete notebook was downloaded as a .txt file. Please attach it to this email before sending.]";
    const trimmed = body.slice(0, 4500) + "\n\n--- (continued in attached file) ---" + note;
    url = `mailto:${RECIPIENT_EMAIL}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(trimmed)}`;
    doDownload();
  }
  const a = document.createElement("a");
  a.href = url;
  a.rel = "noopener";
  a.click();
}

function goTo(i) {
  // If we're advancing forward (Next), fire a silent cloud save.
  if (i > pageIdx) cloudSave();
  pageIdx = i; showNavDD = false; render(); window.scrollTo(0, 0);
}

// ─── INVISIBLE CLOUD SAVE ───
// Sends a silent fire-and-forget POST to the Apps Script Web App.
// Fails silently if SAVE_URL is empty or the network is offline — localStorage still has the data.
let lastCloudSaveTs = 0;
function cloudSave() {
  if (!SAVE_URL) return;
  const now = Date.now();
  if (now - lastCloudSaveTs < 1500) return; // light debounce so back-to-back clicks don't spam
  lastCloudSaveTs = now;
  const payload = {
    secret: SHARED_SECRET,
    scoutName: data.scoutName || "anonymous",
    troop: data.troop || "",
    date: data.date || new Date().toISOString().slice(0, 10),
    timestamp: new Date().toISOString(),
    exportText: formatExport(),
    data: data,
  };
  try {
    fetch(SAVE_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(payload),
      keepalive: true,
    }).catch(() => {});
  } catch (e) { /* silent */ }
}

function render() {
  const page = pages[pageIdx];
  const progress = ((pageIdx + 1) / pages.length) * 100;
  document.getElementById("app").innerHTML = `
    <div class="header">

      </div>
    </div>
    <div class="progress"><div class="progress-fill" style="width:${progress}%"></div></div>
    <div class="dropdown ${showNavDD ? "show" : ""}" style="position:fixed;top:46px;right:calc(50% - 220px)">
      ${pages.map((p, i) => `<button class="${i === pageIdx ? "active" : ""}" onclick="goTo(${i})">${p.title}</button>`).join("")}
    </div>
    <div class="content" onclick="if(showNavDD){showNavDD=false;render()}">${page.render()}</div>
    <div class="bottom-nav">
      <button class="btn-prev" onclick="goTo(${pageIdx - 1})" ${pageIdx === 0 ? "disabled" : ""}>◀ Prev</button>
      <div class="page-label">${page.title}</div>
      <button class="btn-next" onclick="goTo(${pageIdx + 1})" ${pageIdx === pages.length - 1 ? "disabled" : ""}>Next ▶</button>
    </div>
    ${showExportModal ? `<div class="modal-overlay" onclick="if(event.target===this){showExportModal=false;render()}">
      <div class="modal">
        <div class="modal-header">
          <div><div style="font-size:16px;font-weight:700">Submit Your Work</div><div style="font-size:11px;color:#64748b;margin-top:2px">Email it to your counselor — or save a copy</div></div>
          <button onclick="showExportModal=false;render()" style="background:#f1f5f9;border:none;border-radius:8px;padding:6px;cursor:pointer;font-size:16px">✕</button>
        </div>
        <div class="modal-buttons">
          <button class="modal-btn" style="background:#059669;color:#fff;border:none" onclick="doEmail()">✉️ Email to Counselor</button>
          <button class="modal-btn" style="background:#fff;color:#1e293b;border:1.5px solid #e2e8f0" onclick="doDownload()">📄 Download</button>
          <button class="modal-btn" id="copy-btn" style="background:#fff;color:#1e293b;border:1.5px solid #e2e8f0" onclick="doCopy()">📋 Copy</button>
          <button class="modal-btn" style="background:#fff;color:#1e293b;border:1.5px solid #e2e8f0" onclick="doShare()">📤 Share</button>
        </div>
        <div class="modal-preview"><pre>${formatExport().replace(/</g,"&lt;")}</pre></div>
      </div>
    </div>` : ""}`;
}
