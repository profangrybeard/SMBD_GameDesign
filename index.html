<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Follow the Fun — Game Design Notebook</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Outfit', sans-serif; background: #f8fafc; color: #1e293b; -webkit-text-size-adjust: 100%; }
input, textarea, button, select { font-family: 'Outfit', sans-serif; }
.container { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
.header { background: #1a1f36; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 20; }
.header-title { font-size: 14px; font-weight: 700; color: #f8fafc; }
.header-saved { font-size: 10px; color: #059669; margin-left: 8px; display: none; }
.header-saved.show { display: inline; }
.header-right { display: flex; align-items: center; gap: 6px; }
.btn-export { background: #f59e0b; border: none; border-radius: 6px; padding: 6px 10px; color: #fff; font-size: 11px; font-weight: 600; cursor: pointer; }
.btn-nav-toggle { background: rgba(255,255,255,0.1); border: none; border-radius: 6px; padding: 6px 10px; color: #fff; font-size: 11px; font-weight: 600; cursor: pointer; }
.progress { height: 3px; background: #e2e8f0; }
.progress-fill { height: 100%; background: #f59e0b; transition: width 0.3s ease; }
.content { flex: 1; padding: 16px 16px 100px; overflow-y: auto; }
.bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: #fff; border-top: 1px solid #e2e8f0; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; z-index: 20; }
.btn-prev, .btn-next { display: flex; align-items: center; gap: 4px; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
.btn-prev { border: 1.5px solid #1e293b; background: transparent; color: #1e293b; }
.btn-prev:disabled { border-color: #e2e8f0; color: #cbd5e1; cursor: default; }
.btn-next { border: none; background: #059669; color: #fff; }
.btn-next:disabled { background: #e2e8f0; cursor: default; }
.page-label { font-size: 11px; color: #64748b; text-align: center; font-weight: 600; }
.section-header { padding: 14px 16px; border-radius: 10px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
.section-header .title { color: #fff; font-weight: 700; font-size: 15px; }
.section-header .subtitle { color: rgba(255,255,255,0.7); font-size: 11px; margin-top: 2px; }
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 12px; font-weight: 600; color: #1e293b; margin-bottom: 4px; }
.field input, .field textarea { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1.5px solid #e2e8f0; font-size: 14px; background: #fff; color: #1e293b; outline: none; transition: border-color 0.2s; }
.field input:focus, .field textarea:focus { border-color: #f59e0b; }
.field textarea { resize: vertical; min-height: 60px; }
.field.small input, .field.small textarea { padding: 8px 10px; font-size: 13px; }
.card { background: #f1f5f9; border-radius: 10px; padding: 14px; margin-bottom: 10px; }
.card-accent { border-left: 3px solid #f59e0b; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.tag-row { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 12px; }
.tag { font-size: 10px; padding: 3px 8px; border-radius: 12px; background: #f1f5f9; color: #64748b; border: 1px solid #e2e8f0; }
.goal-btn { font-size: 11px; padding: 5px 12px; border-radius: 20px; border: 1.5px solid #e2e8f0; background: #fff; color: #64748b; cursor: pointer; transition: all 0.2s; }
.goal-btn.active { border-color: #f59e0b; background: rgba(245,158,11,0.08); color: #f59e0b; font-weight: 700; }
.dropdown { position: absolute; top: 46px; right: 12px; background: #fff; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); z-index: 30; padding: 6px; min-width: 200px; display: none; }
.dropdown.show { display: block; }
.dropdown button { display: flex; align-items: center; gap: 8px; width: 100%; padding: 8px 10px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; background: transparent; color: #1e293b; text-align: left; }
.dropdown button:hover { background: #f1f5f9; }
.dropdown button.active { background: rgba(245,158,11,0.08); color: #f59e0b; font-weight: 700; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; display: flex; align-items: flex-end; justify-content: center; }
.modal { background: #fff; border-radius: 16px 16px 0 0; width: 100%; max-width: 480px; max-height: 85vh; display: flex; flex-direction: column; }
.modal-header { padding: 16px 16px 12px; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; }
.modal-buttons { padding: 12px 16px; display: flex; gap: 8px; flex-wrap: wrap; }
.modal-btn { flex: 1; min-width: 90px; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 12px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; }
.modal-preview { flex: 1; overflow: auto; padding: 0 16px 16px; }
.modal-preview pre { font-size: 10px; color: #64748b; line-height: 1.5; white-space: pre-wrap; word-break: break-word; background: #f1f5f9; padding: 12px; border-radius: 8px; font-family: monospace; }
.cover-title { text-align: center; padding: 20px 0 10px; }
.cover-title h1 { font-size: 28px; font-weight: 900; color: #1e293b; }
.cover-title .bar { width: 40px; height: 3px; background: #f59e0b; margin: 8px auto; border-radius: 2px; }
.dream-layer { display: flex; align-items: center; gap: 8px; padding: 4px 0; border-bottom: 1px solid #e2e8f0; font-size: 12px; }
.dream-layer:last-child { border-bottom: none; }
.dream-layer .level { font-size: 9px; font-weight: 700; color: #64748b; width: 55px; font-family: monospace; }
.dream-layer .level.deep { color: #f59e0b; }
.dream-layer .name { font-weight: 600; color: #1e293b; }
.dream-layer .desc { margin-left: auto; font-size: 11px; color: #94a3b8; }
.signoff { background: #f1f5f9; border-radius: 10px; padding: 16px; text-align: center; margin-top: 16px; }
.colophon { font-size: 10px; color: #94a3b8; line-height: 1.6; background: #f1f5f9; border-radius: 8px; padding: 12px; margin-top: 20px; }
</style>
</head>
<body>
<div class="container" id="app"></div>
<script>
const STORAGE_KEY = "ftf-workbook-v1";
let data = {};
let pageIdx = 0;
let showNavDD = false;
let showExportModal = false;
let savedTimeout = null;

// Load from localStorage
try { const s = localStorage.getItem(STORAGE_KEY); if (s) data = JSON.parse(s); } catch {}

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
  const el = document.getElementById("saved-indicator");
  if (el) { el.classList.add("show"); clearTimeout(savedTimeout); savedTimeout = setTimeout(() => el.classList.remove("show"), 1500); }
}

function set(key, val) { data[key] = val; save(); }

function field(label, key, opts = {}) {
  const v = data[key] || "";
  const ph = opts.placeholder || "";
  const cls = opts.small ? "field small" : "field";
  if (opts.multiline) {
    return `<div class="${cls}"><label>${label}</label><textarea placeholder="${ph}" oninput="set('${key}',this.value)">${v}</textarea></div>`;
  }
  return `<div class="${cls}"><label>${label}</label><input type="text" value="${esc(v)}" placeholder="${ph}" oninput="set('${key}',this.value)"></div>`;
}

function esc(s) { return (s||"").replace(/"/g, "&quot;").replace(/</g, "&lt;"); }
function sectionHeader(title, subtitle, color) {
  return `<div class="section-header" style="background:${color}"><div><div class="title">${title}</div>${subtitle ? `<div class="subtitle">${subtitle}</div>` : ""}</div></div>`;
}

// ─── PAGES ───
const pages = [
  { id: "cover", title: "Cover", render: renderCover },
  { id: "a1", title: "Game Elements", render: renderA1 },
  { id: "a2", title: "Design Terms", render: renderA2 },
  { id: "a3", title: "Rule Hacking", render: renderA3 },
  { id: "a4", title: "Design Your Game", render: renderA4 },
  { id: "pt", title: "Playtest Log", render: renderPT },
  { id: "bt", title: "Blind Test", render: renderBT },
  { id: "ref", title: "Reflection", render: renderRef },
  { id: "pb", title: "Plan B", render: renderPB },
];

function renderCover() {
  const layers = [
    { level: "SURFACE", name: "Context of Play", desc: "Who plays, where, why" },
    { level: "LEVEL 1", name: "Storytelling", desc: "Narratives from play" },
    { level: "LEVEL 2", name: "Theme", desc: "The wrapper" },
    { level: "DEEPEST", name: "Rules / Abstraction", desc: "Core mechanics", deep: true },
  ];
  return `
    <div class="cover-title"><h1>FOLLOW THE FUN</h1><div class="bar"></div><div style="font-size:14px;color:#64748b">Game Design Notebook</div><div style="font-size:12px;color:#64748b">Game Design Merit Badge</div></div>
    ${field("Scout Name", "scoutName", { placeholder: "Your name" })}
    ${field("Troop / Pack", "troop", { placeholder: "Troop number" })}
    ${field("Date", "date", { placeholder: "Today's date" })}
    <div class="card" style="margin-top:10px">
      <div style="font-size:13px;font-weight:700;margin-bottom:6px">Your Guide Today</div>
      <div style="font-size:12px;color:#64748b;line-height:1.5"><strong>Tim Lindsey</strong> — Professor, SCAD Atlanta<br>~30 Years in Game Development<br><span style="font-size:11px">Cool Boarders • Oblivion • Global Agenda • Lichdom • The Culling • Yuri's Resolve</span></div>
    </div>
    <div class="card">
      <div style="font-size:13px;font-weight:700;margin-bottom:6px">The Dream Layers</div>
      ${layers.map(l => `<div class="dream-layer"><span class="level${l.deep ? " deep" : ""}">${l.level}</span><span class="name">${l.name}</span><span class="desc">${l.desc}</span></div>`).join("")}
    </div>
    <div style="text-align:center;font-size:11px;font-style:italic;color:#1e293b;margin-top:12px">"Our Business is Fun"</div>`;
}

function renderA1() {
  const els = [
    { key: "objects", label: "Objects", hint: "Pieces, tools, items players interact with" },
    { key: "actions", label: "Actions", hint: "What players can DO" },
    { key: "playSpace", label: "Play Space", hint: "Where play happens" },
    { key: "players", label: "Players", hint: "The participants" },
    { key: "goals", label: "Goals", hint: "What players try to achieve" },
    { key: "rules", label: "Rules", hint: "Constraints and mechanics" },
  ];
  return `${sectionHeader("Activity 1: Break a Game You Love", "Workbook Page 2 • Requirement 1a", "#059669")}
    <div style="font-size:13px;color:#64748b;margin-bottom:12px">Pick a game your whole group knows. Identify the six Game Elements.</div>
    ${field("Game Title", "a1_title", { placeholder: "e.g. Fortnite, Minecraft, Uno..." })}
    ${field("Medium", "a1_medium", { placeholder: "board / card / video / physical", small: true })}
    ${els.map(e => field(e.label, "a1_" + e.key, { placeholder: e.hint })).join("")}
    ${field("Group Discussion: What did your group disagree on?", "a1_discussion", { multiline: true, placeholder: "What was hardest to identify?" })}`;
}

function renderA2() {
  const terms = ["Story","Setting","Characters","Play Sequence","Level Design","Interface Design","Difficulty","Balance","Depth","Pace","Replay Value","Age Appropriateness","Single vs. Multi","Coop vs. Competitive","Turn-based vs. Real-time","Strategy vs. Reflex vs. Chance","Abstract vs. Thematic"];
  let html = `${sectionHeader("Activity 2: Design Terms", "Workbook Page 3 • Requirement 2", "#059669")}
    <div style="font-size:12px;color:#64748b;margin-bottom:8px">Circle 5 terms that interest you:</div>
    <div class="tag-row">${terms.map(t => `<span class="tag">${t}</span>`).join("")}</div>`;
  for (let i = 1; i <= 5; i++) {
    html += `<div class="card"><div style="font-size:11px;font-weight:700;color:#64748b;margin-bottom:6px">TERM ${i}</div>
      ${field("Term", `a2_t${i}_term`, { small: true, placeholder: "Which term?" })}
      ${field("Game", `a2_t${i}_game`, { small: true, placeholder: "Game that uses it" })}
      ${field("How it's used", `a2_t${i}_how`, { small: true, placeholder: "Explain how..." })}</div>`;
  }
  return html;
}

function renderA3() {
  const changes = [{ num: 1, rule: "Rock beats everything" }, { num: 2, rule: "You can delay your throw by one beat" }, { num: 3, rule: "Your group invents a change" }];
  return `${sectionHeader("Activity 3: Rule Hacking", "Workbook Page 4 • Requirement 4", "#059669")}
    <div style="font-size:13px;color:#64748b;margin-bottom:12px">Game: <strong>Rock Paper Scissors</strong></div>
    ${changes.map(c => `<div class="card card-accent">
      <div style="font-size:12px;font-weight:700;margin-bottom:8px">RULE CHANGE ${c.num}: ${c.rule}</div>
      ${field("My prediction", `a3_r${c.num}_predict`, { small: true, placeholder: "What do you think will happen?" })}
      ${field("What actually happened", `a3_r${c.num}_result`, { small: true, placeholder: "What happened when you played?" })}
      ${field("How the FEELING changed", `a3_r${c.num}_feeling`, { small: true, placeholder: "How did it feel different?" })}
    </div>`).join("")}`;
}

function renderA4() {
  const goals = ["Tension","Mastery","Surprise","Cooperation","Push-your-luck","Speed","Puzzle","Flow"];
  const selected = (data.a4_goals || "").split(",").map(s => s.trim()).filter(Boolean);
  return `${sectionHeader("Activity 4: Design Your Game", "Workbook Pages 5–6 • Requirement 5", "#059669")}
    ${field("Vision Statement (2–3 sentences)", "a4_vision", { multiline: true, placeholder: "What is this game and why should someone play it?" })}
    <div class="grid-2">
      ${field("Game Name", "a4_name", { small: true, placeholder: "Title" })}
      ${field("Players", "a4_players", { small: true, placeholder: "2–4?" })}
      ${field("Medium", "a4_medium", { small: true, placeholder: "Card, board..." })}
      ${field("Play Time", "a4_time", { small: true, placeholder: "~10 min?" })}
    </div>
    ${field("Theme", "a4_theme", { small: true, placeholder: "What's the game about?" })}
    <div style="margin-bottom:12px">
      <div style="font-size:12px;font-weight:600;margin-bottom:6px">Player Experience Goal (pick 1–2):</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">
        ${goals.map(g => `<button class="goal-btn${selected.includes(g) ? " active" : ""}" onclick="toggleGoal('${g}')">${g}</button>`).join("")}
      </div>
    </div>
    <div style="font-size:12px;font-weight:600;margin-bottom:6px">Core Loop — What happens each turn?</div>
    ${["1. Draw / Setup","2. Decide","3. Act","4. Resolve","5. Score / Check"].map((s, i) => field(s, `a4_loop${i}`, { small: true, placeholder: "What happens?" })).join("")}
    ${field("Rules (list 3–5)", "a4_rules", { multiline: true, placeholder: "1. ...\\n2. ...\\n3. ..." })}
    ${field("Resources", "a4_resources", { multiline: true, placeholder: "Cards, tokens, dice..." })}
    ${field("Sketch Notes", "a4_sketch", { multiline: true, placeholder: "Describe your game components..." })}`;
}

function renderPT() {
  const colors = ["#0891b2", "#f59e0b", "#059669"];
  return `${sectionHeader("Playtest Log", "Workbook Page 7 • Requirement 6", "#059669")}
    ${[1,2,3].map((r, i) => `<div class="card" style="border-left:3px solid ${colors[i]}">
      <div style="font-size:13px;font-weight:700;margin-bottom:8px">PLAYTEST ROUND ${r}</div>
      ${field("Players", `pt${r}_players`, { small: true, placeholder: "Who played?" })}
      ${field("What worked", `pt${r}_worked`, { small: true, placeholder: "What was fun?" })}
      ${field("What was confusing or broken", `pt${r}_broken`, { small: true, placeholder: "What didn't work?" })}
      ${field("What I changed", `pt${r}_changed`, { small: true, placeholder: "One change..." })}
      ${field("Why I changed it", `pt${r}_why`, { small: true, placeholder: "Reason..." })}
      ${field("Result after the change", `pt${r}_after`, { small: true, placeholder: "Did it work?" })}
    </div>`).join("")}`;
}

function renderBT() {
  return `${sectionHeader("The Blind Test", "Workbook Page 8 • Requirement 7", "#059669")}
    <div style="font-size:13px;font-weight:600;margin-bottom:4px">Instruction Sheet</div>
    <div style="font-size:11px;color:#64748b;margin-bottom:10px">Write everything someone needs to play without your help.</div>
    ${field("How to SET UP the game", "bt_setup", { multiline: true, placeholder: "Starting positions, deal cards..." })}
    ${field("How to PLAY (turn sequence)", "bt_play", { multiline: true, placeholder: "On your turn, you..." })}
    ${field("How to WIN / END", "bt_win", { multiline: true, placeholder: "The game ends when..." })}
    ${field("Game objectives", "bt_objectives", { placeholder: "What are players trying to do?" })}
    <div style="font-size:13px;font-weight:600;margin:16px 0 4px">Blind Test Observations</div>
    <div style="font-size:11px;color:#64748b;margin-bottom:10px">Watch the other group. Do NOT help.</div>
    ${field("Rules they misunderstood", "bt_misunderstand", { small: true })}
    ${field("Unexpected actions", "bt_unexpected", { small: true })}
    ${field("Where they got stuck", "bt_stuck", { small: true })}
    ${field("Most fun moment", "bt_fun", { small: true })}
    ${field("What I like most about my game", "bt_like", { multiline: true })}
    ${field("One change I'd still make", "bt_change", { multiline: true })}`;
}

function renderRef() {
  return `${sectionHeader("Reflection + Sign-Off", "Workbook Page 9 • Requirement 8b", "#1a1f36")}
    <div style="font-size:13px;font-weight:600;margin-bottom:8px">Three things I learned today:</div>
    ${field("1.", "reflect1", { multiline: true, placeholder: "I learned that..." })}
    ${field("2.", "reflect2", { multiline: true, placeholder: "I learned that..." })}
    ${field("3.", "reflect3", { multiline: true, placeholder: "I learned that..." })}
    <div class="signoff">
      <div style="font-size:24px;margin-bottom:8px">🏆</div>
      <div style="font-size:14px;font-weight:700">Requirement 8b</div>
      <div style="font-size:12px;color:#64748b;margin-top:4px;line-height:1.5">You met with a professional in game development education today.</div>
      <div style="font-size:11px;color:#94a3b8;margin-top:8px;font-style:italic">Your counselor will sign your printed workbook.</div>
    </div>`;
}

function renderPB() {
  let html = `${sectionHeader("Plan B: Take-Home", "Requirements 1a, 1b, and 3", "#64748b")}
    <div style="font-size:12px;color:#64748b;margin-bottom:12px;font-style:italic">Complete these with your regular counselor if needed.</div>
    <div style="font-size:13px;font-weight:700;margin-bottom:8px">Req 1a: Three More Games</div>`;
  for (let g = 2; g <= 4; g++) {
    html += `<div class="card"><div style="font-size:11px;font-weight:700;color:#64748b;margin-bottom:6px">GAME ${g}</div>
      <div class="grid-2">${field("Title", `pb_g${g}_title`, { small: true })}${field("Medium", `pb_g${g}_medium`, { small: true })}</div>
      ${field("Objectives", `pb_g${g}_obj`, { small: true })}
      ${field("Rules (2–3)", `pb_g${g}_rules`, { small: true })}
      <div class="grid-2">${field("Resources", `pb_g${g}_res`, { small: true })}${field("Theme", `pb_g${g}_theme`, { small: true })}</div></div>`;
  }
  html += `<div style="font-size:13px;font-weight:700;margin:16px 0 8px">Req 1b: Four Types of Play Value</div>`;
  for (let i = 1; i <= 4; i++) {
    html += `<div class="grid-2">${field(`Type ${i}`, `pb_pv${i}_type`, { small: true })}${field("Game Example", `pb_pv${i}_game`, { small: true })}</div>`;
  }
  html += `<div style="font-size:13px;font-weight:700;margin:16px 0 8px">Req 3: Intellectual Property</div>
    ${field("Define intellectual property", "pb_ip_def", { multiline: true })}
    ${field("Three types of IP in games", "pb_ip_types", { multiline: true })}
    ${field("Why is IP protection necessary?", "pb_ip_why", { multiline: true })}
    ${field("Licensed property example", "pb_ip_example", { placeholder: "e.g. Star Wars Lego sets" })}
    <div class="colophon"><strong style="color:#1e293b">About These Materials</strong><br>Curriculum by Tim Lindsey, SCAD Atlanta. ~30 years professional game development.<br>Materials produced with AI assistance (Anthropic Claude) under author's creative direction.<br><em>The AI is a tool — like a pencil or a game engine. You are the designer.</em></div>`;
  return html;
}

function toggleGoal(g) {
  let current = (data.a4_goals || "").split(",").map(s => s.trim()).filter(Boolean);
  if (current.includes(g)) current = current.filter(x => x !== g);
  else current.push(g);
  set("a4_goals", current.join(", "));
  render();
}

function formatExport() {
  const ln = (label, key) => data[key] ? `${label}: ${data[key]}` : "";
  const sep = "\n" + "=".repeat(40);
  const s = (title) => `${sep}\n${title}${sep}`;
  let lines = [
    "FOLLOW THE FUN — Game Design Notebook",
    `Scout: ${data.scoutName || "(not filled)"}`, `Troop: ${data.troop || ""}`, `Date: ${data.date || ""}`,
    s("ACTIVITY 1: GAME ELEMENTS (Req 1a)"),
    ln("Game", "a1_title"), ln("Medium", "a1_medium"), ln("Objects", "a1_objects"), ln("Actions", "a1_actions"), ln("Play Space", "a1_playSpace"), ln("Players", "a1_players"), ln("Goals", "a1_goals"), ln("Rules", "a1_rules"), ln("Discussion", "a1_discussion"),
    s("ACTIVITY 2: DESIGN TERMS (Req 2)"),
    ...[1,2,3,4,5].flatMap(i => [ln(`Term ${i}`, `a2_t${i}_term`), ln("  Game", `a2_t${i}_game`), ln("  How", `a2_t${i}_how`)]),
    s("ACTIVITY 3: RULE HACKING (Req 4)"),
    ...[1,2,3].flatMap(i => [`Rule Change ${i}:`, ln("  Prediction", `a3_r${i}_predict`), ln("  Result", `a3_r${i}_result`), ln("  Feeling", `a3_r${i}_feeling`)]),
    s("ACTIVITY 4: DESIGN YOUR GAME (Req 5)"),
    ln("Vision", "a4_vision"), ln("Name", "a4_name"), ln("Players", "a4_players"), ln("Medium", "a4_medium"), ln("Time", "a4_time"), ln("Theme", "a4_theme"), ln("Goals", "a4_goals"),
    "Core Loop:", ...[0,1,2,3,4].map(i => ln(`  Step ${i+1}`, `a4_loop${i}`)),
    ln("Rules", "a4_rules"), ln("Resources", "a4_resources"),
    s("PLAYTEST LOG (Req 6)"),
    ...[1,2,3].flatMap(r => [`Round ${r}:`, ln("  Worked", `pt${r}_worked`), ln("  Broken", `pt${r}_broken`), ln("  Changed", `pt${r}_changed`), ln("  Why", `pt${r}_why`), ln("  Result", `pt${r}_after`)]),
    s("BLIND TEST (Req 7)"),
    ln("Setup", "bt_setup"), ln("Play", "bt_play"), ln("Win", "bt_win"), ln("Misunderstood", "bt_misunderstand"), ln("Unexpected", "bt_unexpected"), ln("Stuck", "bt_stuck"), ln("Fun Moment", "bt_fun"), ln("Like Most", "bt_like"), ln("Change", "bt_change"),
    s("REFLECTION (Req 8b)"),
    ln("1", "reflect1"), ln("2", "reflect2"), ln("3", "reflect3"),
    "\n— Follow the Fun • timlindsey.com —",
  ];
  return lines.filter(Boolean).join("\n");
}

function doDownload() {
  const name = (data.scoutName || "scout").replace(/\s+/g, "_").toLowerCase();
  const blob = new Blob([formatExport()], { type: "text/plain" });
  const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
  a.download = `game_design_notebook_${name}.txt`; a.click(); URL.revokeObjectURL(a.href);
}

function doCopy() {
  const ta = document.createElement("textarea"); ta.value = formatExport();
  ta.style.cssText = "position:fixed;left:-9999px"; document.body.appendChild(ta);
  ta.select(); document.execCommand("copy"); document.body.removeChild(ta);
  const btn = document.getElementById("copy-btn");
  if (btn) { btn.textContent = "✓ Copied!"; setTimeout(() => { btn.textContent = "📋 Copy"; }, 2000); }
}

function doShare() {
  if (navigator.share) {
    navigator.share({ title: `Game Design Notebook — ${data.scoutName || "Scout"}`, text: formatExport() }).catch(() => {});
  } else { doCopy(); }
}

function goTo(i) { pageIdx = i; showNavDD = false; render(); window.scrollTo(0, 0); }

function render() {
  const page = pages[pageIdx];
  const progress = ((pageIdx + 1) / pages.length) * 100;
  document.getElementById("app").innerHTML = `
    <div class="header">
      <div style="display:flex;align-items:center"><span class="header-title">Follow the Fun</span><span class="header-saved" id="saved-indicator">✓ Saved</span></div>
      <div class="header-right">
        <button class="btn-export" onclick="showExportModal=true;render()">📤 Export</button>
        <button class="btn-nav-toggle" onclick="showNavDD=!showNavDD;render()">${pageIdx + 1}/${pages.length} ▾</button>
      </div>
    </div>
    <div class="progress"><div class="progress-fill" style="width:${progress}%"></div></div>
    <div class="dropdown ${showNavDD ? "show" : ""}" style="position:fixed;top:46px;right:calc(50% - 220px)">
      ${pages.map((p, i) => `<button class="${i === pageIdx ? "active" : ""}" onclick="goTo(${i})">${p.title}</button>`).join("")}
    </div>
    <div class="content" onclick="if(showNavDD){showNavDD=false;render()}">${page.render()}</div>
    <div class="bottom-nav">
      <button class="btn-prev" onclick="goTo(${pageIdx - 1})" ${pageIdx === 0 ? "disabled" : ""}>◀ Prev</button>
      <div class="page-label">${page.title}</div>
      <button class="btn-next" onclick="goTo(${pageIdx + 1})" ${pageIdx === pages.length - 1 ? "disabled" : ""}>Next ▶</button>
    </div>
    ${showExportModal ? `<div class="modal-overlay" onclick="if(event.target===this){showExportModal=false;render()}">
      <div class="modal">
        <div class="modal-header">
          <div><div style="font-size:16px;font-weight:700">Export Your Work</div><div style="font-size:11px;color:#64748b;margin-top:2px">Save or share your notebook</div></div>
          <button onclick="showExportModal=false;render()" style="background:#f1f5f9;border:none;border-radius:8px;padding:6px;cursor:pointer;font-size:16px">✕</button>
        </div>
        <div class="modal-buttons">
          <button class="modal-btn" style="background:#059669;color:#fff;border:none" onclick="doDownload()">📄 Download .txt</button>
          <button class="modal-btn" id="copy-btn" style="background:#fff;color:#1e293b;border:1.5px solid #1e293b" onclick="doCopy()">📋 Copy</button>
          <button class="modal-btn" style="background:#fff;color:#1e293b;border:1.5px solid #e2e8f0" onclick="doShare()">📤 Share</button>
        </div>
        <div class="modal-preview"><pre>${formatExport().replace(/</g,"&lt;")}</pre></div>
      </div>
    </div>` : ""}`;
}

render();
</script>
</body>
</html>
